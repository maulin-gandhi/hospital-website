<!DOCTYPE html>
<html>
<head>

    <!-- ✅ LOGIN PROTECTION (MOST IMPORTANT) -->
    <script>
    if (localStorage.getItem("isLoggedIn") !== "true") {
        window.location.href = "/login.html";
    }
    </script>

    <title>Admin Panel</title>

    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background: #f4f4f4;
        }

        h2 {
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            margin-top: 20px;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: center;
        }

        th {
            background: #007bff;
            color: white;
        }

        /* Buttons */
        .edit-btn {
            background: #ffc107;
            color: black;
            border: none;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
        }

        .delete-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
        }

        .logout-btn {
            background: red;
            color: white;
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<!-- ✅ LOGOUT BUTTON -->
<div style="text-align:right;">
    <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<h2>Appointments</h2>

<table>
    <thead>
        <tr>
            <th>Appointment ID</th>
            <th>Name</th>
            <th>Phone</th>
            <th>Email</th>
            <th>Date</th>
            <th>Time</th>
            <th>Message</th>
            <th>Action</th>
        </tr>
    </thead>

    <tbody id="tableBody"></tbody>
</table>

<script>

// ✅ LOGOUT FUNCTION
function logout() {
    localStorage.removeItem("isLoggedIn");
    window.location.href = "/login.html";
}

// ✅ FETCH DATA
fetch('/appointments')
.then(res => res.json())
.then(data => {

    const tbody = document.getElementById("tableBody");

    // ✅ EMPTY DATA MESSAGE
    if (data.length === 0) {
        tbody.innerHTML = "<tr><td colspan='8'>No appointments yet</td></tr>";
        return;
    }

    data.forEach(item => {

        const row = `
        <tr>
            <td>${item.appointment_id}</td>
            <td>${item.name}</td>
            <td>${item.phone}</td>
            <td>${item.email || '-'}</td>
            <td>${item.date}</td>
            <td>${item.time}</td>
            <td>${item.message || '-'}</td>
            <td>
                <button class="edit-btn" onclick="editAppointment(${item.id})">✏ Edit</button>
                <button class="delete-btn" onclick="deleteAppointment(${item.id})">🗑 Delete</button>
            </td>
        </tr>
        `;

        tbody.innerHTML += row;
    });

});

// ✅ DELETE
function deleteAppointment(id) {
    fetch('/appointments/' + id, {
        method: 'DELETE'
    })
    .then(() => {
        alert("Deleted!");
        location.reload();
    });
}

// ✅ EDIT
function editAppointment(id) {

    const name = prompt("Enter Name:");
    const phone = prompt("Enter Phone:");
    const email = prompt("Enter Email:");
    const date = prompt("Enter Date:");
    const time = prompt("Enter Time:");
    const message = prompt("Enter Message:");

    fetch('/appointments/' + id, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, phone, email, date, time, message })
    })
    .then(() => {
        alert("Updated!");
        location.reload();
    });
}

</script>

</body>
</html>
