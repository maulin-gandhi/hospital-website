<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f5f5;
        }

        table {
            width: 90%;
            margin: auto;
            background: white;
        }

        th {
            background-color: #007bff;
            color: white;
        }

        td, th {
            text-align: center;
            padding: 10px;
        }

        .edit-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
        }

        .delete-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<!-- 🔷 HEADER -->
<div style="display:flex; justify-content:space-between; align-items:center; 
            padding:15px 20px; background:#007bff; color:white;">

    <h2 style="margin:0;">Clinic Admin Panel</h2>

    <button onclick="logout()" 
        style="background:#dc3545; color:white; padding:8px 15px; 
               border:none; border-radius:5px; cursor:pointer;">
        Logout
    </button>
</div>

<!-- 🔷 TITLE -->
<h3 style="text-align:center; margin-top:20px;">Appointments</h3>

<!-- 🔷 TABLE -->
<table border="1" class="mt-3">
    <thead>
        <tr>
            <th>Appointment ID</th>
            <th>Name</th>
            <th>Phone</th>
            <th>Email</th>
            <th>Date</th>
            <th>Time</th>
            <th>Message</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody>
    </tbody>
</table>

<script>

// 🔄 LOAD DATA
fetch('/appointments')
.then(res => res.json())
.then(data => {
    const tbody = document.querySelector("tbody");

    if (data.length === 0) {
        tbody.innerHTML = "<tr><td colspan='8'>No appointments yet</td></tr>";
        return;
    }

    data.forEach(item => {
        const row = `
            <tr>
                <td>${item.appointment_id}</td>
                <td>${item.name}</td>
                <td>${item.phone}</td>
                <td>${item.email || '-'}</td>
                <td>${item.date}</td>
                <td>${item.time}</td>
                <td>${item.message || '-'}</td>
                <td>
                    <button class="edit-btn" onclick="editAppointment(${item.id})">Edit</button>
                    <button class="delete-btn" onclick="deleteAppointment(${item.id})">Delete</button>
                </td>
            </tr>
        `;
        tbody.innerHTML += row;
    });
});

// 🗑 DELETE
function deleteAppointment(id) {
    if (!confirm("Are you sure to delete?")) return;

    fetch(`/appointments/${id}`, {
        method: 'DELETE'
    })
    .then(res => res.json())
    .then(() => location.reload());
}

// ✏ EDIT
function editAppointment(id) {
    const name = prompt("Enter new name:");
    const phone = prompt("Enter new phone:");
    const email = prompt("Enter new email:");
    const date = prompt("Enter new date:");
    const time = prompt("Enter new time:");
    const message = prompt("Enter new message:");

    fetch(`/appointments/${id}`, {
        method: 'PUT',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ name, phone, email, date, time, message })
    })
    .then(res => res.json())
    .then(() => location.reload());
}

// 🚪 LOGOUT
function logout() {
    window.location.href = "/logout";
}

</script>

</body>
</html>
