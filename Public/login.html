<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="d-flex justify-content-center align-items-center" style="height:100vh; background:#f5f5f5;">

<div class="card p-4" style="width:300px;">
    <h3 class="text-center mb-3">Admin Login</h3>

    <input type="text" id="username" class="form-control mb-2" placeholder="Username" required>
    <input type="password" id="password" class="form-control mb-3" placeholder="Password" required>

    <button class="btn btn-primary w-100" onclick="login()">Login</button>
</div>

<script>
async function login() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();

    const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    console.log(data); // 👈 IMPORTANT (for debug)

    if (data.success) {
        window.location.href = "/admin.html";
    } else {
        alert("Invalid login!");
    }
}
</script>

</body>
</html>
