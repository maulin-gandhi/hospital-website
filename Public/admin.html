<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f5f5;
        }
        .card-box {
            padding: 20px;
            border-radius: 10px;
            color: white;
        }
    </style>
</head>

<body class="p-4">

<!-- 🔐 Protect Page -->
<script>
if (localStorage.getItem("isLoggedIn") !== "true") {
    window.location.href = "login.html";
}
</script>

<div class="container">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Dashboard 🔥</h2>
        <button class="btn btn-danger" onclick="logout()">Logout</button>
    </div>

    <!-- DASHBOARD CARDS -->
    <div class="row mb-4">
        <div class="col-md-6">
            <div class="card-box bg-primary">
                <h5>Total Appointments</h5>
                <h3 id="totalCount">0</h3>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card-box bg-success">
                <h5>Today Appointments</h5>
                <h3 id="todayCount">0</h3>
            </div>
        </div>
    </div>

    <!-- APPOINTMENTS LIST -->
    <h4>Appointments List</h4>

    <!-- SEARCH -->
    <input type="text" id="search" class="form-control mb-3" placeholder="Search by name or phone">

    <!-- TABLE -->
    <table class="table table-bordered table-striped text-center">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Phone</th>
                <th>Date</th>
                <th>Time</th>
                <th>Message</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="data"></tbody>
    </table>

</div>

<!-- SCRIPT -->
<script>

// Logout
function logout() {
    localStorage.removeItem("isLoggedIn");
    window.location.href = "login.html";
}

// Dashboard counts
function updateDashboard(data) {

    let total = data.length;

    // ✅ Get today's date in correct format
    let today = new Date().toLocaleDateString("en-CA");

    // ✅ Count today's appointments correctly
    let todayCount = data.filter(item => {
        if (!item.date) return false;

        return item.date === today;
    }).length;

    // ✅ Update UI
    document.getElementById("totalCount").innerText = total;
    document.getElementById("todayCount").innerText = todayCount;
}

// ✅ FIXED TABLE RENDER
function renderTable(list) {

    let rows = "";

    if (list.length === 0) {
        rows = `<tr><td colspan="7">No Appointments Found</td></tr>`;
    }

    list.forEach(item => {

        if (!item.name || !item.phone) return;

        // ✅ DATE FIX (MAIN LOGIC)
        let formattedDate = "-";

        if (item.date) {
            let d = new Date(item.date);

            let year = d.getFullYear();
            let month = String(d.getMonth() + 1).padStart(2, '0');
            let day = String(d.getDate()).padStart(2, '0');

            formattedDate = `${year}-${month}-${day}`;
        }

        let itemTime = item.time ? item.time : "-";

        rows += `
        <tr>
            <td>${item.id}</td>
            <td>${item.name}</td>
            <td>${item.phone}</td>
            <td>${formattedDate}</td> <!-- ✅ IMPORTANT -->
            <td>${itemTime}</td>
            <td>${item.message || "-"}</td>
            <td>
                <button class="btn btn-danger btn-sm" onclick="deleteData(${item.id})">Delete</button>
            </td>
        </tr>`;
    });

    document.getElementById("data").innerHTML = rows;
}

// Load data
function loadAppointments() {
    fetch("http://localhost:3000/appointments")
        .then(res => res.json())
        .then(data => {

            updateDashboard(data);
            renderTable(data);

            // Search
            const searchInput = document.getElementById("search");

            searchInput.addEventListener("keyup", function () {
                let value = this.value.toLowerCase();

                let filtered = data.filter(item =>
                    (item.name || "").toLowerCase().includes(value) ||
                    (item.phone || "").includes(value)
                );

                renderTable(filtered);
            });

        });
}

// Delete
function deleteData(id) {
    fetch(`http://localhost:3000/delete/${id}`, {
        method: "DELETE"
    })
    .then(() => loadAppointments());
}

// Run
loadAppointments();

</script>

</body>
</html>
