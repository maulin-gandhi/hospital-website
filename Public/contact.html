<section class="contact-section">

    <form action="/appointment" method="POST" id="appointmentForm" class="contact-form">

        <h2>Book Appointment</h2>

        <input type="text" name="name" placeholder="Full Name" required>

        <input type="text" name="phone" placeholder="Phone Number" required>

        <input type="email" name="email" placeholder="Email (optional)">

        <input type="date" name="date" required>

        <input type="time" name="time" required>

        <textarea name="message" placeholder="Message"></textarea>

        <button type="submit">Book Appointment</button>

        <p id="formMessage"></p>

    </form>

</section>

<a href="https://wa.me/919869066447" class="whatsapp-float" target="_blank">💬</a>

<script>
document.getElementById("appointmentForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const formData = new FormData(this);

    const data = {
        name: formData.get("name"),
        phone: formData.get("phone"),
        email: formData.get("email"),
        date: formData.get("date"),
        time: formData.get("time"),
        message: formData.get("message")
    };

    try {
        await fetch("/appointment", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        document.getElementById("formMessage").innerText = "✅ Appointment booked successfully!";
        document.getElementById("formMessage").style.color = "green";

        document.getElementById("appointmentForm").reset();

    } catch (error) {
        document.getElementById("formMessage").innerText = "❌ Error booking appointment";
        document.getElementById("formMessage").style.color = "red";
    }
});
</script>
