<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background: #f4f4f4;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }
        th, td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: center;
        }
        th {
            background: #007bff;
            color: white;
        }
    </style>
</head>
<body>

<h2>Appointments</h2>

<table id="table">
    <thead>
        <tr>
            <th>Name</th>
            <th>Phone</th>
            <th>Email</th>
            <th>Date</th>
            <th>Time</th>
            <th>Message</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>
fetch('/appointments')
.then(res => res.json())
.then(data => {
    const tbody = document.querySelector("tbody");

    data.forEach(item => {
        const row = `
            <tr>
                <td>${item.name}</td>
                <td>${item.phone}</td>
                <td>${item.email || '-'}</td>
                <td>${item.date}</td>
                <td>${item.time}</td>
                <td>${item.message || '-'}</td>
                <td>
                    <button onclick="deleteAppointment(${item.id})">Delete</button>
                </td>
            </tr>
        `;
        tbody.innerHTML += row;
    });
});

function deleteAppointment(id) {
    fetch('/appointments/' + id, {
        method: 'DELETE'
    })
    .then(() => {
        alert("Deleted!");
        location.reload();
    });
}
</script>

</body>
</html>
