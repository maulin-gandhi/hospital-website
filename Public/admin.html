<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background: #f4f4f4;
        }

        h2 {
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: center;
        }

        th {
            background: #007bff;
            color: white;
        }

        button {
            padding: 5px 10px;
            margin: 2px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .edit-btn {
            background: #28a745;
            color: white;
        }

        .delete-btn {
            background: #dc3545;
            color: white;
        }

        button:hover {
            opacity: 0.8;
        }
    </style>
</head>

<body>

<h2>Appointments</h2>

<table>
    <thead>
        <tr>
            <th>Appointment ID</th>
            <th>Name</th>
            <th>Phone</th>
            <th>Email</th>
            <th>Date</th>
            <th>Time</th>
            <th>Message</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody id="tableBody"></tbody>
</table>

<script>
// 🔄 Fetch Data
fetch('/appointments')
.then(res => res.json())
.then(data => {
    const tbody = document.querySelector("tbody");

    // ✅ ADD THIS HERE
    if (data.length === 0) {
        tbody.innerHTML = "<tr><td colspan='8'>No appointments yet</td></tr>";
        return; // stop further execution
    }

    data.forEach(item => {
        const row = `
            <tr>
                <td>${item.appointment_id}</td>
                <td>${item.name}</td>
                <td>${item.phone}</td>
                <td>${item.email || '-'}</td>
                <td>${item.date}</td>
                <td>${item.time}</td>
                <td>${item.message || '-'}</td>
                <td>
                    <button class="edit-btn" onclick="editAppointment(${item.id})">✏ Edit</button>
                    <button class="delete-btn" onclick="deleteAppointment(${item.id})">🗑 Delete</button>
                </td>
            </tr>
        `;
        tbody.innerHTML += row;
    });
});

// ❌ DELETE
function deleteAppointment(id) {
    if (!confirm("Are you sure you want to delete?")) return;

    fetch('/appointments/' + id, {
        method: 'DELETE'
    })
    .then(() => {
        alert("Deleted!");
        location.reload();
    });
}

// ✏️ EDIT
function editAppointment(id, name, phone, email, date, time, message) {
    const newName = prompt("Enter Name:", name);
    const newPhone = prompt("Enter Phone:", phone);
    const newEmail = prompt("Enter Email:", email);
    const newDate = prompt("Enter Date:", date);
    const newTime = prompt("Enter Time:", time);
    const newMessage = prompt("Enter Message:", message);

    if (!newName || !newPhone) {
        alert("Name & Phone required!");
        return;
    }

    fetch('/appointments/' + id, {
        method: 'PUT',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            name: newName,
            phone: newPhone,
            email: newEmail,
            date: newDate,
            time: newTime,
            message: newMessage
        })
    })
    .then(() => {
        alert("Updated!");
        location.reload();
    });
}
</script>

</body>
</html>
