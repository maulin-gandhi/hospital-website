<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="d-flex justify-content-center align-items-center" style="height:100vh; background:#f5f5f5;">

<div class="card p-4" style="width:300px;">
    <h3 class="text-center mb-3">Admin Login</h3>

    <input type="text" id="username" class="form-control mb-2" placeholder="Username" required>
    <input type="password" id="password" class="form-control mb-3" placeholder="Password" required>

    <button class="btn btn-primary w-100" onclick="login()">Login</button>
</div>

<script>

function login() {
    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;

    // 🔐 Simple login (we will improve later)
    if (user === "admin" && pass === "Admin@123") {
        localStorage.setItem("isLoggedIn", "true");
        window.location.href = "admin.html";
    } else {
        alert("Invalid login!");
    }
}

document.addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        login();
    }
});

</script>

</body>
</html>
